version: '3.8'

services:
  # Traefik Reverse Proxy
  traefik:
    image: traefik:v3.0
    container_name: traefik
    ports:
      - "80:80"
      - "443:443"
      - "${TRAEFIK_DASHBOARD_BIND:-127.0.0.1:8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/${TRAEFIK_CONFIG_FILE:-traefik.prod.yml}:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./ssl:/ssl
      - ./logs/traefik:/var/log/traefik
    environment:
      - TRAEFIK_LOG_LEVEL=${TRAEFIK_LOG_LEVEL:-INFO}
      - EMAIL=${EMAIL:-admin@example.com}
    restart: ${RESTART_POLICY:-unless-stopped}
    networks:
      - web

  # Shared MySQL Database (accessible by all clients)
  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpassword}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-app_db}
      - MYSQL_USER=${MYSQL_USER:-app_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-app_password}
    restart: ${RESTART_POLICY:-unless-stopped}
    networks:
      - web
    command: --default-authentication-plugin=mysql_native_password

  # Redis - For ERPNext and other applications that need caching/queues
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: ${RESTART_POLICY:-unless-stopped}
    networks:
      - web
    command: redis-server --appendonly yes

  # phpMyAdmin - MySQL Administration Tool
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - PMA_USER=${PMA_USER:-}             # Empty in production to force manual login
      - PMA_PASSWORD=${PMA_PASSWORD:-}     # Empty in production to force manual login
      - UPLOAD_LIMIT=300M
      - MAX_EXECUTION_TIME=300
    volumes:
      - ./traefik/phpmyadmin/config.user.inc.php:/etc/phpmyadmin/config.user.inc.php:ro
    restart: ${RESTART_POLICY:-unless-stopped}
    networks:
      - web
    labels:
      - "traefik.enable=true"
      # HTTP router
      - "traefik.http.routers.phpmyadmin-http.rule=Host(`${PHPMYADMIN_HOST}`)"
      - "traefik.http.routers.phpmyadmin-http.entrypoints=web"
      - "traefik.http.routers.phpmyadmin-http.service=phpmyadmin"
      # HTTPS router
      - "traefik.http.routers.phpmyadmin.rule=Host(`${PHPMYADMIN_HOST}`)"
      - "traefik.http.routers.phpmyadmin.entrypoints=websecure"
      - "traefik.http.routers.phpmyadmin.tls.certresolver=letsencrypt"
      - "traefik.http.routers.phpmyadmin.service=phpmyadmin"
      # Service definition
      - "traefik.http.services.phpmyadmin.loadbalancer.server.port=80"
      # Middlewares
      - "traefik.http.routers.phpmyadmin.middlewares=security-headers@file,gzip@file"
      - "traefik.http.routers.phpmyadmin-http.middlewares=security-headers@file,gzip@file"

  # phpLiteAdmin - SQLite Database Admin
  phpliteadmin:
    image: php:8.2-apache
    container_name: phpliteadmin
    volumes:
      - ./phpliteadmin:/var/www/html
      - ./clients:/var/www/clients:ro
    restart: ${RESTART_POLICY:-unless-stopped}
    networks:
      - web
    labels:
      - "traefik.enable=true"
      # HTTP router
      - "traefik.http.routers.phpliteadmin-http.rule=Host(`${PHPLITEADMIN_HOST}`)"
      - "traefik.http.routers.phpliteadmin-http.entrypoints=web"
      - "traefik.http.routers.phpliteadmin-http.service=phpliteadmin"
      # HTTPS router
      - "traefik.http.routers.phpliteadmin.rule=Host(`${PHPLITEADMIN_HOST}`)"
      - "traefik.http.routers.phpliteadmin.entrypoints=websecure"
      - "traefik.http.routers.phpliteadmin.tls.certresolver=letsencrypt"
      - "traefik.http.routers.phpliteadmin.service=phpliteadmin"
      # Service definition
      - "traefik.http.services.phpliteadmin.loadbalancer.server.port=80"
      # Middlewares
      - "traefik.http.routers.phpliteadmin.middlewares=security-headers@file,gzip@file"
      - "traefik.http.routers.phpliteadmin-http.middlewares=security-headers@file,gzip@file"

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  web:
    name: web
    external: false
